<style>
body{
    margin:0;
    background: radial-gradient(circle at center, #050014, #000000);
    height:100vh;
    overflow:hidden;
    display:flex;
    justify-content:center;
    align-items:center;

    flex-direction:column;
    font-family: 'Segoe UI', sans-serif;
    color:white;
}

/* Outer Glow Ring */
.ring{
    width:200px;
    height:200px;
    border-radius:50%;
    border:4px solid rgba(0,255,255,0.6);
    box-shadow: 0 0 20px cyan, 0 0 60px cyan;
    display:flex;
    justify-content:center;
    align-items:center;
    animation: rotate 6s linear infinite;
}

/* Inner Core */
.core{
    width:80px;
    height:80px;
    border-radius:50%;
    background: cyan;
    box-shadow: 0 0 30px cyan, 0 0 80px cyan;
    animation: pulse 2s ease-in-out infinite;
}

/* Rotating dots */
.dot{
    width:12px;
    height:12px;
    background:cyan;
    border-radius:50%;
    position:absolute;
}
.dot1{ top:-6px; left:94px;}
.dot2{ bottom:-6px; left:94px;}
.dot3{ left:-6px; top:94px;}
.dot4{ right:-6px; top:94px;}

@keyframes rotate{
    from{transform:rotate(0deg);}
    to{transform:rotate(360deg);}
}

@keyframes pulse{
    0%,100%{transform:scale(1);}
    50%{transform:scale(1.3);}
}

h2{
    margin-top:30px;
    letter-spacing:3px;
    text-shadow:0 0 10px cyan,0 0 30px cyan;
}
h5{
    color:#aaa;
    margin-top:40px; 
    text-align:center;
    animation: glow 1s infinite alternate;
}


#TextInput {
    background: #181818a8;
    border: 1px solid cyan;
    box-shadow: 0 0 15px cyan;
    border-radius: 10px;
    padding: 8px 15px;
    margin-top: 30px;
}


.input-field {
    background-color: transparent;
    border: none;
    width: 95%;
    outline: none;
    color: white;
    font-family: cursive;
}

.glow-on-hover {
    width: 35px;
    height: 35px;
    border: none;
    outline: none;
    color: #fff;
    background: #111;
    cursor: pointer;
    position: relative;
    z-index: 0;
    border-radius: 10px;
    padding: 0px;
    margin-left: 10px;
}

.glow-on-hover:before{
    content: '';
    background: linear-gradient(45deg, #000000, #171616, #1c1c1c);
    position: absolute;
    top: -2px;
    left: -2px;
    background-size: 400%;
    z-index: -1;
    filter: blur(5px);
    width: calc(100% + 4px);
    height: calc(100% + 4px);
    animation: opacity .3s ease-in-out;
    border-radius: 10px;
}

.glow-on-hover:active{
    color: #181818a8;
}

.glow-on-hover:active:after{
    background-color: transparent;
}


#siriwave p{
    position: relative;
    top: -80px;   /* negative = upar jayega */
    font-size: 22px;
    color: rgb(231, 242, 242);
    text-shadow: 0 0 10px rgb(231, 238, 238);
}

#saarthiText{
   position: relative;
   top: -120px;
   letter-spacing: 2px;
   text-shadow: 0 0 15px rgb(225, 232, 232);
}




</style>
</head>
